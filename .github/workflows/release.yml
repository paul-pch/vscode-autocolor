name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run tests
        run: xvfb-run npm test

      - name: Package extension
        run: npm run package

      - name: Read version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        run: |
          gh release create "v${{ steps.version.outputs.value }}" \
            autocolor-${{ steps.version.outputs.value }}.vsix \
            --title "v${{ steps.version.outputs.value }}" \
            --notes-file CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Open VSX
        run: npx ovsx publish autocolor-${{ steps.version.outputs.value }}.vsix -p ${{ secrets.OVSX_TOKEN }}
